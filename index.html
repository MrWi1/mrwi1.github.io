<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>宸星电竞大转盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 40%, #0d2137 100%);
    color: #e0e8f0;
    min-height: 100vh;
    overflow-x: hidden;
}

/* === 三角洲军事风格背景 === */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        radial-gradient(ellipse at 20% 50%, rgba(30,80,120,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(20,60,100,0.2) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(40,100,140,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* === 一、顶部主题 === */
.header {
    text-align: center;
    padding: 30px 0 20px;
    position: relative;
}
.header h1 {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(180deg, #f0d060 0%, #e8a020 50%, #c07818 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 6px;
    position: relative;
    display: inline-block;
}
.header h1::before, .header h1::after {
    content: "◆";
    -webkit-text-fill-color: #f0d060;
    font-size: 20px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
}
.header h1::before { left: -40px; }
.header h1::after { right: -40px; }
.header .subtitle {
    font-size: 14px;
    color: #7aa5c8;
    letter-spacing: 8px;
    margin-top: 8px;
}

/* === 二、获奖播报 === */
.broadcast-bar {
    background: linear-gradient(90deg, transparent, rgba(240,208,96,0.12), transparent);
    border: 1px solid rgba(240,208,96,0.25);
    border-radius: 8px;
    padding: 14px 20px;
    margin: 15px auto 25px;
    max-width: 800px;
    font-size: 18px;
    color: #f0d060;
    letter-spacing: 2px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}
.broadcast-bar .broadcast-icon {
    margin-right: 10px;
    font-size: 22px;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* === 三、转盘区域 === */
.wheel-section {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}
.wheel-panel {
    background: rgba(15,30,55,0.8);
    border: 1px solid rgba(100,160,220,0.2);
    border-radius: 16px;
    padding: 25px 20px 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 40px rgba(30,80,140,0.15);
    transition: box-shadow 0.3s;
}
.wheel-panel:hover {
    box-shadow: 0 0 60px rgba(30,80,140,0.3);
}
.wheel-panel h2 {
    font-size: 22px;
    margin-bottom: 15px;
    letter-spacing: 3px;
}
.wheel-panel.high h2 { color: #f0d060; }
.wheel-panel.normal h2 { color: #7ec8e3; }

.wheel-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 15px;
}
.wheel-wrapper canvas {
    display: block;
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
    transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

/* 指针 */
.wheel-pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 30px solid #f0d060;
    filter: drop-shadow(0 3px 6px rgba(240,208,96,0.5));
    z-index: 10;
    transition: filter 0.3s;
}
.wheel-pointer::after {
    content: "";
    position: absolute;
    top: -34px;
    left: -8px;
    width: 16px;
    height: 16px;
    background: #f0d060;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(240,208,96,0.6);
}

.spin-btn {
    display: inline-block;
    padding: 12px 40px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 3px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
}
.spin-btn.high {
    background: linear-gradient(135deg, #f0d060, #e8a020);
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(240,208,96,0.3);
}
.spin-btn.normal {
    background: linear-gradient(135deg, #7ec8e3, #4a90b8);
    color: #fff;
    box-shadow: 0 4px 20px rgba(126,200,227,0.3);
}
.spin-btn:hover { transform: translateY(-2px); }
.spin-btn:active { transform: translateY(0); }
.spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* === 四、奖品剩余数量 === */
.stock-section {
    background: rgba(15,30,55,0.8);
    border: 1px solid rgba(100,160,220,0.2);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 0 40px rgba(30,80,140,0.1);
}
.stock-section h2 {
    text-align: center;
    font-size: 22px;
    color: #f0d060;
    margin-bottom: 20px;
    letter-spacing: 3px;
}
.stock-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}
.stock-item {
    background: rgba(30,60,100,0.4);
    border: 1px solid rgba(100,160,220,0.15);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
    transition: all 0.3s;
}
.stock-item.depleted {
    background: rgba(60,60,60,0.4);
    border-color: rgba(100,100,100,0.2);
}
.stock-item .stock-name {
    font-size: 12px;
    color: #b0c4d8;
    margin-bottom: 6px;
    line-height: 1.4;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.stock-item.depleted .stock-name { color: #666; }
.stock-item .stock-count {
    font-size: 18px;
    font-weight: bold;
}
.stock-item .stock-count.has { color: #4ade80; }
.stock-item .stock-count.low { color: #fbbf24; }
.stock-item .stock-count.depleted { color: #ef4444; }
.stock-item .stock-total {
    font-size: 11px;
    color: #5a7a9a;
    margin-top: 2px;
}

/* === 五、中奖名单 === */
.win-section {
    background: rgba(15,30,55,0.8);
    border: 1px solid rgba(100,160,220,0.2);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 0 40px rgba(30,80,140,0.1);
}
.win-section h2 {
    text-align: center;
    font-size: 22px;
    color: #f0d060;
    margin-bottom: 15px;
    letter-spacing: 3px;
}
.win-list {
    max-height: 300px;
    overflow-y: auto;
    padding: 0 10px;
}
.win-list::-webkit-scrollbar { width: 6px; }
.win-list::-webkit-scrollbar-thumb {
    background: rgba(100,160,220,0.3);
    border-radius: 3px;
}
.win-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    border-bottom: 1px solid rgba(100,160,220,0.1);
    font-size: 14px;
    transition: background 0.2s;
}
.win-item:hover { background: rgba(30,60,100,0.3); }
.win-item .win-time { color: #5a7a9a; font-size: 12px; }
.win-item .win-user { color: #7ec8e3; font-weight: bold; }
.win-item .win-prize { color: #f0d060; }
.win-empty {
    text-align: center;
    color: #5a7a9a;
    padding: 30px;
    font-size: 15px;
}

/* === 六、底部重置倒计时 === */
.footer {
    text-align: center;
    padding: 20px;
    color: #5a7a9a;
    font-size: 13px;
}
.footer .reset-timer {
    background: rgba(30,60,100,0.4);
    border: 1px solid rgba(100,160,220,0.15);
    border-radius: 10px;
    padding: 12px 20px;
    display: inline-block;
    margin-top: 10px;
}
.footer .reset-timer .timer-label { color: #7aa5c8; }
.footer .reset-timer .timer-value { color: #f0d060; font-weight: bold; font-size: 16px; }

/* === 弹窗 === */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: linear-gradient(135deg, #1a2f4a, #152a42);
    border: 1px solid rgba(100,160,220,0.3);
    border-radius: 16px;
    padding: 35px 30px;
    text-align: center;
    min-width: 320px;
    box-shadow: 0 0 60px rgba(30,80,140,0.4);
    animation: modalIn 0.3s ease;
}
@keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-box h3 {
    color: #f0d060;
    font-size: 20px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}
.modal-box input {
    width: 100%;
    padding: 12px 15px;
    font-size: 16px;
    border: 1px solid rgba(100,160,220,0.3);
    border-radius: 10px;
    background: rgba(10,20,40,0.8);
    color: #fff;
    outline: none;
    transition: border-color 0.3s;
}
.modal-box input:focus { border-color: #f0d060; }
.modal-box input::placeholder { color: #5a7a9a; }
.modal-btns {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.modal-btns button {
    flex: 1;
    padding: 10px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
}
.modal-confirm {
    background: linear-gradient(135deg, #f0d060, #e8a020);
    color: #1a1a2e;
}
.modal-cancel {
    background: rgba(60,80,100,0.5);
    color: #b0c4d8;
}
.modal-btns button:hover { transform: translateY(-1px); }

/* 中奖弹窗 */
.win-modal .modal-box {
    background: linear-gradient(135deg, #2a1f00, #3a2a00);
    border-color: rgba(240,208,96,0.4);
}
.win-modal .win-prize-name {
    font-size: 24px;
    color: #f0d060;
    margin: 15px 0;
    letter-spacing: 2px;
    line-height: 1.5;
}
.win-modal .win-user-name {
    font-size: 18px;
    color: #7ec8e3;
}

/* 响应式 */
@media (max-width: 768px) {
    .header h1 { font-size: 28px; letter-spacing: 3px; }
    .wheel-section { gap: 20px; }
    .wheel-panel { padding: 20px 15px 15px; }
    .wheel-wrapper canvas { width: 280px; height: 280px; }
    .stock-grid { grid-template-columns: repeat(2, 1fr); }
    .modal-box { min-width: 280px; padding: 25px 20px; }
}
</style>
</head>
<body>

<div class="container">

    <!-- 一、顶部主题 -->
    <div class="header">
        <h1>宸星电竞大转盘</h1>
        <div class="subtitle">DELTA FORCE · 三角洲行动</div>
    </div>

    <!-- 二、获奖播报 -->
    <div class="broadcast-bar" id="broadcast">
        <span class="broadcast-icon">📢</span>
        <span id="broadcastText">等待开奖...</span>
    </div>

    <!-- 三、转盘区域 -->
    <div class="wheel-section">
        <div class="wheel-panel high">
            <h2>🔥 高级转盘</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <canvas id="wheelHigh" width="360" height="360"></canvas>
            </div>
            <br><br>
            <button class="spin-btn high" id="spinBtnHigh" onclick="startSpin('high')">开始抽奖</button>
        </div>
        <div class="wheel-panel normal">
            <h2>🎮 普通转盘</h2>
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <canvas id="wheelNormal" width="360" height="360"></canvas>
            </div>
            <br><br>
            <button class="spin-btn normal" id="spinBtnNormal" onclick="startSpin('normal')">开始抽奖</button>
        </div>
    </div>

    <!-- 四、奖品剩余数量 -->
    <div class="stock-section">
        <h2>📦 奖品库存一览</h2>
        <div class="stock-grid" id="stockGrid"></div>
    </div>

    <!-- 五、中奖名单 -->
    <div class="win-section">
        <h2>🏆 中奖名单汇总</h2>
        <div class="win-list" id="winList">
            <div class="win-empty">暂无中奖记录</div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        <p>宸星电竞 · 三角洲行动主题大转盘</p>
        <div class="reset-timer">
            <span class="timer-label">⏰ 下一轮刷新倒计时：</span>
            <span class="timer-value" id="resetTimer">--</span>
        </div>
    </div>

</div>

<!-- 用户名输入弹窗 -->
<div class="modal-overlay" id="nameModal">
    <div class="modal-box">
        <h3>🎯 输入你的名字</h3>
        <input type="text" id="userNameInput" placeholder="请输入用户名..." maxlength="20" autofocus>
        <div class="modal-btns">
            <button class="modal-cancel" onclick="closeNameModal()">取消</button>
            <button class="modal-confirm" onclick="confirmName()">确认抽奖</button>
        </div>
    </div>
</div>

<!-- 中奖结果弹窗 -->
<div class="modal-overlay win-modal" id="winModal">
    <div class="modal-box">
        <h3>🎉 恭喜中奖！</h3>
        <div class="win-user-name" id="winUserName"></div>
        <div class="win-prize-name" id="winPrizeName"></div>
        <button class="modal-confirm" style="margin-top:15px;padding:10px 40px;" onclick="closeWinModal()">我知道了</button>
    </div>
</div>

<script>
// ========== 奖品配置 ==========
// displayName: 转盘上显示的名称（\n 表示换行）
// realName: 完整奖品名称（用于播报、弹窗、库存记录）
// total: 总数量
const PRIZE_CONFIG = [
    { displayName: "双护体验单\n（价值138元）", realName: "双护体验单（价值138元）", total: 1 },
    { displayName: "陪玩体验单\n0.5H 28.8R立减18.8", realName: "陪玩体验单0.5H28.8R立减18.8", total: 5 },
    { displayName: "陪玩体验单\n0.5H 28.8R立减8.8", realName: "陪玩体验单0.5H28.8R立减8.8", total: 10 },
    { displayName: "机密盲盒陪\n（原价99元）立减19", realName: "机密盲盒陪（原价99元）99立减19", total: 20 },
    { displayName: "绝密盲盒陪\n（原价188元）立减28", realName: "绝密盲盒陪（原价188元）188立减28", total: 20 },
    { displayName: "绝密盲盒陪\n（原价188元）立减18", realName: "绝密盲盒陪（原价188元）188立减18", total: 20 },
    { displayName: "九折趣味单", realName: "九折趣味单", total: 20 },
    { displayName: "新赛季通行证\n折现38.8R", realName: "新赛季通行证，折现38.8R", total: 3 },
    { displayName: "店存50R\n不可折现抵扣", realName: "店存50R，不可折现，可用于任意单抵扣", total: 5 },
    { displayName: "八五折任意单一次", realName: "八五折任意单一次", total: 10 },
    { displayName: "原价82折订单一次", realName: "原价82折订单一次", total: 5 },
    { displayName: "3X3任务立减88", realName: "3X3任务立减88", total: 5 },
    { displayName: "3X3任务立减50", realName: "3X3任务立减50", total: 10 },
    { displayName: "奶茶一杯", realName: "奶茶一杯", total: 3 },
    { displayName: "任意单加200w保底", realName: "任意单加200w保底", total: 30 },
    { displayName: "任意单加100w保底", realName: "任意单加100w保底", total: 40 },
    { displayName: "5.2R现金红包", realName: "5.2R现金红包", total: 3 },
    { displayName: "满200减20", realName: "满200减20", total: 25 },
    { displayName: "高级KFC一份", realName: "高级KFC一份", total: 1 },
    { displayName: "九五折保底单", realName: "九五折保底单", total: 10 }
];

// 用 realName 做 key 的快速查找表
const CONFIG_BY_REALNAME = {};
PRIZE_CONFIG.forEach(cfg => {
    CONFIG_BY_REALNAME[cfg.realName] = cfg;
});

// 高级转盘奖品 realName 列表（含重复项，对应不同配置）
const HIGH_PRIZES = [
    "双护体验单（价值138元）",
    "陪玩体验单0.5H28.8R立减18.8",
    "机密盲盒陪（原价99元）99立减19",
    "绝密盲盒陪（原价188元）188立减28",
    "九折趣味单",
    "新赛季通行证，折现38.8R",
    "店存50R，不可折现，可用于任意单抵扣",
    "八五折任意单一次",
    "原价82折订单一次",
    "3X3任务立减88",
    "奶茶一杯",
    "任意单加200w保底",
    "5.2R现金红包",
    "满200减20",
    "高级KFC一份"
];

// 普通转盘奖品 realName 列表
const NORMAL_PRIZES = [
    "陪玩体验单0.5H28.8R立减8.8",
    "机密盲盒陪（原价99元）99立减19",
    "绝密盲盒陪（原价188元）188立减18",
    "九折趣味单",
    "九五折保底单",
    "3X3任务立减50",
    "任意单加100w保底",
    "5.2R现金红包",
    "满200减20"
];

// ========== 数据管理 ==========
const STORAGE_KEY = "delta_wheel_data";

function getWeekKey() {
    const now = new Date();
    const year = now.getFullYear();
    const week = Math.ceil(((now - new Date(year, 0, 1)) / 86400000 + 1) / 7);
    return `${year}-W${week}`;
}

function loadData() {
    const weekKey = getWeekKey();
    let data = localStorage.getItem(STORAGE_KEY);
    if (data) {
        data = JSON.parse(data);
        if (data.weekKey !== weekKey) {
            return initData(weekKey);
        }
        return data;
    }
    return initData(weekKey);
}

function initData(weekKey) {
    const stock = {};
    const allRealNames = new Set();
    PRIZE_CONFIG.forEach(cfg => allRealNames.add(cfg.realName));
    allRealNames.forEach(name => {
        if (name === "满200减20") {
            return;
        }
        const cfg = CONFIG_BY_REALNAME[name];
        stock[name] = cfg.total;
    });

    // "满200减20" 在高级/普通中转盘中共享一个库存池（总25次）
    stock["满200减20_total"] = 25;

    const data = {
        weekKey: weekKey,
        stock: stock,
        winRecords: [],
        lastUpdate: Date.now()
    };
    saveData(data);
    return data;
}

function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let appData = loadData();

// ========== 获取可用奖品池 ==========
function getAvailablePool(prizeList) {
    return prizeList.filter(realName => {
        return getStock(realName) > 0;
    });
}

// 获取某奖品当前库存（处理共享库存的特殊情况）
function getStock(realName) {
    if (realName === "满200减20") {
        return appData.stock["满200减20_total"] || 0;
    }
    return appData.stock[realName] || 0;
}

// 扣减库存
function deductStock(realName) {
    if (realName === "满200减20") {
        appData.stock["满200减20_total"]--;
    } else {
        appData.stock[realName]--;
    }
}

// ========== 转盘绘制 ==========
const COLORS = [
    "#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#1abc9c",
    "#3498db", "#9b59b6", "#e84393", "#00b894", "#fdcb6e",
    "#6c5ce7", "#d63031", "#00cec9", "#fab1a0", "#55efc4",
    "#fd79a8", "#a29bfe", "#ffeaa7", "#dfe6e9", "#b2bec3"
];

function getColor(index) {
    return COLORS[index % COLORS.length];
}

// 根据 realName 获取显示名
function getDisplayName(realName) {
    const cfg = CONFIG_BY_REALNAME[realName];
    return cfg ? cfg.displayName : realName;
}

// 绘制转盘（如果 highlightIndex 指定，则高亮该扇区）
function drawWheel(canvasId, prizeList, highlightIndex) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = cx - 10;
    const size = prizeList.length;
    const arc = (2 * Math.PI) / size;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 外圈装饰
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 6, 0, 2 * Math.PI);
    ctx.strokeStyle = "rgba(240,208,96,0.4)";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 中心圆
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
    ctx.fillStyle = "#1a2f4a";
    ctx.fill();
    ctx.strokeStyle = "#f0d060";
    ctx.lineWidth = 2;
    ctx.stroke();

    prizeList.forEach((realName, i) => {
        const displayName = getDisplayName(realName);
        const stock = getStock(realName);
        const isAvailable = stock > 0;
        const startAngle = arc * i - Math.PI / 2;
        const endAngle = arc * (i + 1) - Math.PI / 2;

        // 扇形
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();

        // 高亮中奖扇区
        if (i === highlightIndex) {
            ctx.fillStyle = "#ffdd57";
            ctx.shadowColor = "#ffdd57";
            ctx.shadowBlur = 15;
        } else {
            ctx.fillStyle = isAvailable ? getColor(i) : "#3a3a3a";
            ctx.shadowBlur = 0;
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1;
        ctx.stroke();

        // 文字
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = "center";

        const textR = radius * 0.60;
        const lines = displayName.split("\n");

        if (lines.length === 1) {
            ctx.fillStyle = (i === highlightIndex) ? "#1a1a2e" : (isAvailable ? "#fff" : "#666");
            ctx.font = "bold 11px 'Microsoft YaHei'";
            ctx.fillText(lines[0], textR, 4);
        } else {
            ctx.fillStyle = (i === highlightIndex) ? "#1a1a2e" : (isAvailable ? "#fff" : "#666");
            ctx.font = "bold 10px 'Microsoft YaHei'";
            ctx.fillText(lines[0], textR, -6);
            ctx.font = "bold 10px 'Microsoft YaHei'";
            ctx.fillText(lines[1], textR, 8);
        }
        ctx.restore();
    });

    // 中心文字
    ctx.fillStyle = "#f0d060";
    ctx.font = "bold 14px 'Microsoft YaHei'";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("GO", cx, cy);
}

// ========== 转盘旋转动画 ==========
let spinning = false;
let currentType = "";
let lastHighlightIndex = {}; // 记录每个转盘上次高亮的扇区

function spinWheelAnimation(canvasId, prizeList, targetIndex, duration) {
    return new Promise(resolve => {
        const canvas = document.getElementById(canvasId);
        const totalSlices = prizeList.length;
        const sliceAngle = 360 / totalSlices;

        // ===== 核心角度计算 =====
        // 绘制时：扇区 i 的中心角度 = i*sliceAngle + sliceAngle/2 - 90°（从3点方向算）
        // CSS旋转：顺时针为正
        // 目标：旋转后扇区 i 中心角度 = -90°（正顶部，指针位置）
        //
        // 旋转θ后，扇区中心角度 = i*sliceAngle + sliceAngle/2 - 90 + θ
        // 令其 = -90 → θ = -(i*sliceAngle + sliceAngle/2)
        // 转为正数：θ = 360 - (i*sliceAngle + sliceAngle/2)
        //
        // 验证 i=0: θ = 360 - sliceAngle/2
        //   旋转后角度 = sliceAngle/2 - 90 + 360 - sliceAngle/2 = 270 ≡ -90° ✓
        // 验证 i=1: θ = 360 - (sliceAngle + sliceAngle/2) = 360 - 1.5*sliceAngle
        //   旋转后角度 = 1.5*sliceAngle - 90 + 360 - 1.5*sliceAngle = 270 ≡ -90° ✓

        const targetAngle = 360 - (targetIndex * sliceAngle + sliceAngle / 2);
        const totalRotation = 360 * 5 + targetAngle; // 5圈 + 目标角度
        const startTime = performance.now();

        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

        function animate(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = easeOutCubic(progress);
            const currentAngle = eased * totalRotation;

            canvas.style.transform = `rotate(${currentAngle}deg)`;

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                canvas.style.transform = `rotate(${totalRotation}deg)`;
                resolve();
            }
        }
        requestAnimationFrame(animate);
    });
}

// ========== 抽奖主逻辑 ==========
function startSpin(type) {
    if (spinning) return;
    currentType = type;
    document.getElementById("nameModal").classList.add("active");
    document.getElementById("userNameInput").focus();
}

function closeNameModal() {
    document.getElementById("nameModal").classList.remove("active");
    document.getElementById("userNameInput").value = "";
}

function confirmName() {
    const name = document.getElementById("userNameInput").value.trim();
    if (!name) {
        alert("请输入用户名！");
        return;
    }
    closeNameModal();
    doSpin(name);
}

async function doSpin(userName) {
    spinning = true;
    const btnHigh = document.getElementById("spinBtnHigh");
    const btnNormal = document.getElementById("spinBtnNormal");
    btnHigh.disabled = true;
    btnNormal.disabled = true;

    const prizeList = currentType === "high" ? HIGH_PRIZES : NORMAL_PRIZES;
    const canvasId = currentType === "high" ? "wheelHigh" : "wheelNormal";

    // 获取可用奖品（realName 列表）
    let available = getAvailablePool(prizeList);
    if (available.length === 0) {
        alert("所有奖品已抽完！");
        spinning = false;
        btnHigh.disabled = false;
        btnNormal.disabled = false;
        return;
    }

    // 随机抽取一个 realName
    const randomIndex = Math.floor(Math.random() * available.length);
    const pickedReal = available[randomIndex];

    // 找到在完整列表中的索引（用于转盘动画定位）
    const fullIndex = prizeList.indexOf(pickedReal);

    // 先清除之前的旋转状态，重绘转盘
    const canvas = document.getElementById(canvasId);
    canvas.style.transform = "rotate(0deg)";
    // 强制重绘
    canvas.offsetHeight;
    drawWheel(canvasId, prizeList, -1);

    // 等待一小段时间
    await new Promise(r => setTimeout(r, 300));

    // 旋转动画（3秒）
    await spinWheelAnimation(canvasId, prizeList, fullIndex, 3000);

    // === 核心保证：转盘指针指向 = 抽中结果 ===
    // 动画的 targetAngle 是根据 fullIndex 精确计算的，
    // 动画结束后 canvas 的旋转角度一定对应 fullIndex 扇区指向指针。
    // 因此直接使用 pickedReal，无需再从 DOM 反推角度（避免浮点误差）。
    const finalPrize = pickedReal;

    // 高亮中奖扇区
    drawWheel(canvasId, prizeList, fullIndex);

    // 扣减库存
    deductStock(finalPrize);
    const remaining = getStock(finalPrize);

    // 记录中奖（使用完整 realName）
    const record = {
        user: userName,
        prize: finalPrize,
        time: new Date().toLocaleString("zh-CN"),
        type: currentType
    };
    appData.winRecords.unshift(record);
    saveData(appData);

    // 更新UI
    updateBroadcast(userName, finalPrize);
    updateStockUI();
    updateWinList();

    // 显示中奖弹窗（显示完整奖品名称）
    document.getElementById("winUserName").textContent = `🎖️ ${userName}`;
    document.getElementById("winPrizeName").textContent = finalPrize;
    document.getElementById("winModal").classList.add("active");

    spinning = false;
    btnHigh.disabled = false;
    btnNormal.disabled = false;
}

function closeWinModal() {
    document.getElementById("winModal").classList.remove("active");
}

// ========== 更新播报 ==========
function updateBroadcast(user, prize) {
    const el = document.getElementById("broadcastText");
    el.textContent = `恭喜 ${user} 获得 ${prize}！`;
}

// ========== 更新库存UI ==========
function updateStockUI() {
    const grid = document.getElementById("stockGrid");
    grid.innerHTML = "";

    // 收集所有唯一奖品，按配置顺序显示
    const displayed = new Set();
    PRIZE_CONFIG.forEach(cfg => {
        if (displayed.has(cfg.realName)) return;
        displayed.add(cfg.realName);

        const left = getStock(cfg.realName);
        const item = document.createElement("div");
        item.className = "stock-item" + (left <= 0 ? " depleted" : "");

        const countClass = left <= 0 ? "depleted" : (left <= 3 ? "low" : "has");

        item.innerHTML = `
            <div class="stock-name">${cfg.realName}</div>
            <div class="stock-count ${countClass}">${left}</div>
            <div class="stock-total">/ ${cfg.total}</div>
        `;
        grid.appendChild(item);
    });
}

// ========== 更新中奖名单（用户名居中） ==========
function updateWinList() {
    const list = document.getElementById("winList");
    if (appData.winRecords.length === 0) {
        list.innerHTML = '<div class="win-empty">暂无中奖记录</div>';
        return;
    }
    list.innerHTML = appData.winRecords.map(r => `
        <div class="win-item">
            <span class="win-time">${r.time}</span>
            <span class="win-user">${r.user}</span>
            <span class="win-prize">${r.prize}</span>
        </div>
    `).join("");
}

// ========== 每周重置倒计时 ==========
function updateResetTimer() {
    const now = new Date();
    const msToNextMonday = (() => {
        const current = now.getDay();
        const daysUntilMonday = current === 0 ? 1 : (8 - current) % 7;
        const nextMonday = new Date(now);
        nextMonday.setDate(now.getDate() + daysUntilMonday);
        nextMonday.setHours(0, 0, 0, 0);
        return nextMonday - now;
    })();

    const totalSec = Math.floor(msToNextMonday / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    const el = document.getElementById("resetTimer");
    el.textContent = `${d}天 ${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}

// ========== 初始化 ==========
function init() {
    drawWheel("wheelHigh", HIGH_PRIZES, -1);
    drawWheel("wheelNormal", NORMAL_PRIZES, -1);
    updateStockUI();
    updateWinList();
    updateResetTimer();
    setInterval(updateResetTimer, 1000);

    // 回车确认用户名
    document.getElementById("userNameInput").addEventListener("keydown", e => {
        if (e.key === "Enter") confirmName();
    });
}

init();
</script>
